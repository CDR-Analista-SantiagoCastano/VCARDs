server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = / {
        try_files $vcard_prefix/index.html /index.html =404;
    }

    location ~ ^/([^/.]+)$ {
        return 301 /$1/;
    }

    location / {
        try_files $vcard_prefix$uri $vcard_prefix$uri/ $uri $uri/ =404;
    }
}
